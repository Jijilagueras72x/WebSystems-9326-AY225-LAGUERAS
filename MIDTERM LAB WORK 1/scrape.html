<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Text Scraper · Formatted Article View</title>
    <!-- Font Awesome 6 (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- jQuery 3.7.1 -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            transition: all 0.2s ease;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(145deg, #0b1622 0%, #0f1a2b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            margin: 0;
        }
        .glass-card {
            max-width: 1000px;
            width: 100%;
            background: rgba(18, 28, 46, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 36px;
            padding: 36px 40px;
            box-shadow: 0 30px 50px -15px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.05);
        }
        h2 {
            font-weight: 500;
            font-size: 2.1rem;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f0f9ff;
        }
        h2 i {
            color: #22c55e;
            font-size: 2rem;
        }
        .sub {
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 0.95rem;
            border-left: 3px solid #22c55e;
            padding-left: 16px;
            background: rgba(34, 197, 94, 0.05);
            border-radius: 0 8px 8px 0;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        .input-group input {
            flex: 1 1 280px;
            padding: 16px 20px;
            background: #0a111f;
            border: 1.5px solid #2d3a4f;
            border-radius: 60px;
            font-size: 1.1rem;
            color: white;
            outline: none;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.5);
        }
        .input-group input:focus {
            border-color: #22c55e;
            background: #0b1424;
        }
        .input-group button {
            background: #22c55e;
            border: none;
            padding: 16px 34px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.2rem;
            color: #0f172a;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(34, 197, 94, 0.3);
            transition: 0.15s;
            border: 1px solid rgba(255,255,255,0.2);
            letter-spacing: 0.3px;
        }
        .input-group button i {
            font-size: 1.2rem;
        }
        .input-group button:hover {
            background: #16a34a;
            transform: scale(1.02);
            box-shadow: 0 10px 22px #22c55e70;
            color: white;
        }
        .input-group button:active {
            transform: scale(0.98);
        }
        .status-bar {
            background: #0e1629;
            border-radius: 80px;
            padding: 12px 22px;
            margin: 20px 0 22px 0;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid #2a374b;
            color: #b0c5e0;
            font-weight: 400;
            backdrop-filter: blur(4px);
        }
        .status-bar i {
            color: #38bdf8;
            width: 22px;
            font-size: 1.2rem;
        }
        #status {
            flex: 1;
            word-break: break-word;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(100, 200, 255, 0.2);
            border-radius: 50%;
            border-top-color: #22c55e;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #94a3b8;
        }
        .output-header label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .copy-btn {
            background: transparent;
            border: 1px solid #3b4c64;
            color: #b9c9e6;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background: #1e2b40;
            color: white;
            border-color: #22c55e;
        }
        /* ---------- FORMATTED ARTICLE STYLES (like a clean newspaper) ---------- */
        #output {
            background: #020617d0;
            border: 1px solid #2a3a55;
            border-radius: 28px;
            padding: 32px 36px;
            min-height: 280px;
            max-height: 600px;
            overflow: auto;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1.1rem;
            line-height: 1.75;
            color: #e6edf5;
            box-shadow: inset 0 0 20px #00000055;
            scrollbar-width: thin;
            scrollbar-color: #22c55e #0f1a2b;
            text-rendering: optimizeLegibility;
        }
        #output p {
            margin: 0 0 1.2em 0;
            padding: 0;
            text-align: left;
            word-spacing: 0.5px;
        }
        #output p:last-child {
            margin-bottom: 0;
        }
        /* optional headings inside article remain smaller but distinct */
        #output h1, #output h2, #output h3, #output h4 {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            color: #d9e6f2;
            margin: 1.2em 0 0.4em 0;
            line-height: 1.3;
        }
        #output h1 { font-size: 1.8rem; }
        #output h2 { font-size: 1.5rem; }
        #output h3 { font-size: 1.3rem; }
        /* blockquote style */
        #output blockquote {
            border-left: 4px solid #22c55e;
            background: #0f1a2b;
            padding: 0.8em 1.2em;
            margin: 1.2em 0;
            font-style: italic;
            color: #cbd5e1;
            border-radius: 0 20px 20px 0;
        }
        #output ul, #output ol {
            padding-left: 1.8em;
            margin: 0.8em 0;
        }
        #output li {
            margin: 0.3em 0;
        }
        #output a {
            color: #7ac7ff;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        /* fallback plain text gets wrapped in paragraphs via js, but we ensure any text node is readable */
        #output::-webkit-scrollbar {
            width: 10px;
        }
        #output::-webkit-scrollbar-track {
            background: #0f1a2b;
            border-radius: 10px;
        }
        #output::-webkit-scrollbar-thumb {
            background: #22c55e;
            border-radius: 10px;
            border: 2px solid #0f1a2b;
        }
        .footer-note {
            margin-top: 18px;
            text-align: right;
            color: #3f5270;
            font-size: 0.8rem;
        }
        .footer-note i {
            color: #22c55e;
        }
        .fa-solid, .fa-regular {
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>
            <i class="fas fa-newspaper"></i> 
            Universal Text Scraper
        </h2>
        <div class="sub">
            <i class="fas fa-arrow-right" style="margin-right: 8px;"></i>
            extracts article · automatic paragraph formatting · newspaper style
        </div>

        <div class="input-group">
            <input type="text" id="url" placeholder="https://example.com/article" value="https://en.wikipedia.org/wiki/Web_scraping">
            <button id="scrapeBtn">
                <i class="fas fa-cloud-download-alt"></i> Scrape
            </button>
        </div>

        <!-- status bar with dynamic icon + spinner -->
        <div class="status-bar">
            <i class="fas fa-circle-nodes" id="statusIcon" style="color:#3b82f6;"></i>
            <span id="status">⏻ idle · enter url</span>
            <span id="loadingSpinner" style="display: none; margin-left: auto; align-items: center;">
                <span class="spinner"></span> <span style="margin-left: 6px;">working</span>
            </span>
        </div>

        <div class="output-header">
            <label><i class="far fa-file-lines" style="margin-right: 6px;"></i> FORMATTED ARTICLE</label>
            <button class="copy-btn" id="copyBtn"><i class="far fa-copy"></i> copy as text</button>
        </div>

        <!-- output area now will contain formatted html (paragraphs, etc) -->
        <div id="output">📄 Result will appear here as a clean article ...</div>
        <div class="footer-note">
            <i class="fas fa-shield-alt"></i> multi‑proxy · smart formatter
        </div>
    </div>

    <script>
        $(document).ready(function(){

            // ----------------------------------- PROXIES (unchanged)
            const PROXIES = [
                {
                    name:'corsproxy.io',
                    buildUrl:(target)=>`https://corsproxy.io/?${encodeURIComponent(target)}`,
                    extract:async(res)=>res.text()
                },
                {
                    name:'allorigins.win',
                    buildUrl:(target)=>`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`,
                    extract:async(res)=>{
                        const j = await res.json();
                        return j.contents;
                    }
                },
                {
                    name:'codetabs.com',
                    buildUrl:(target)=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(target)}`,
                    extract:async(res)=>res.text()
                }
            ];

            // Helper to update status bar
            function updateStatus(msg, iconClass, color, showSpinner = false) {
                $('#status').text(msg);
                $('#statusIcon').attr('class', `fas ${iconClass}`).css('color', color);
                if (showSpinner) {
                    $('#loadingSpinner').css('display', 'flex');
                } else {
                    $('#loadingSpinner').hide();
                }
            }

            // ----- fetch via proxy (same)
            async function fetchHTML(url) {
                for (const proxy of PROXIES) {
                    try {
                        updateStatus(`🔁 trying proxy: ${proxy.name} ...`, 'fa-cloud', '#f59e0b', true);
                        const response = await fetch(proxy.buildUrl(url));
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const html = await proxy.extract(response);
                        updateStatus(`✅ loaded via ${proxy.name}`, 'fa-check-circle', '#22c55e', false);
                        return html;
                    } catch (e) {
                        console.warn(proxy.name, "failed", e);
                    }
                }
                throw new Error("✗ all proxies failed — url might be unreachable");
            }

            // ---------------- NEW FORMATTING FUNCTION (returns HTML with proper paragraphs)
            function formatTextAsArticle(plainText) {
                if (!plainText || plainText.trim() === '') {
                    return '<p style="color:#94a3b8;">⚠️ No readable content extracted.</p>';
                }

                // Split by double newlines (paragraph breaks)
                let blocks = plainText.split(/\n\s*\n/);
                // filter out blocks that are only whitespace
                blocks = blocks.filter(b => b.trim().length > 0);

                if (blocks.length === 0) {
                    // fallback: treat single line as one paragraph
                    return `<p>${escapeHtml(plainText.trim())}</p>`;
                }

                // Build article: each block becomes a <p>, but we try to detect headers/lists?
                // For simplicity and like "format in the page", we wrap each block in <p>.
                // But also we'll preserve basic markdown-like detection (all caps line? but we keep simple)
                let articleHtml = '';
                blocks.forEach(block => {
                    // trim inner spaces but keep line breaks within block as <br>? 
                    // but we want paragraphs. Use <p> and replace single newlines inside block with <br> 
                    // to preserve line breaks inside a paragraph.
                    let lines = block.split('\n').filter(l => l.trim() !== '');
                    if (lines.length <= 1) {
                        // single line paragraph
                        articleHtml += `<p>${escapeHtml(block.trim())}</p>\n`;
                    } else {
                        // multiple lines: join with <br> for inline line breaks, but still inside <p>
                        let inner = lines.map(l => escapeHtml(l.trim())).join('<br>');
                        articleHtml += `<p>${inner}</p>\n`;
                    }
                });

                return articleHtml;
            }

            // simple escape for safety (prevent XSS from weird page text)
            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"']/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    if (m === "'") return '&#039;';
                    return m;
                });
            }

            // ----- cleanHTML (returns plain text, but we also preserve structure via newlines)
            function cleanHTML(html) {
                let parser = new DOMParser();
                let doc = parser.parseFromString(html, "text/html");

                let removeTags = [
                    "script","style","noscript","svg",
                    "img","video","iframe","nav","footer",
                    "header","aside","form","button"
                ];
                removeTags.forEach(tag => {
                    doc.querySelectorAll(tag).forEach(el => el.remove());
                });

                // remove likely ad/sidebar elements
                doc.querySelectorAll(
                    '[class*="ad"],[id*="ad"],[class*="sidebar"],[class*="menu"]'
                ).forEach(el => {
                    el.remove();
                });

                // get innerText – preserves line breaks naturally
                let text = doc.body.innerText || '';
                // normalize excessive newlines (leave paragraph breaks)
                text = text.replace(/\n\s*\n\s*\n/g, '\n\n');  // max two newlines
                return text.trim() || '';
            }

            // ----- main scrape function
            async function performScrape() {
                const url = $('#url').val().trim();
                if (!url) {
                    alert('🌐 please enter a URL');
                    return;
                }

                // Show loading in output as well
                $('#output').html('<div style="display: flex; gap:10px; align-items: center; color:#94a3b8;"><i class="fas fa-spinner fa-pulse"></i> fetching & building article ...</div>');
                updateStatus('⏳ starting scrape ...', 'fa-spinner fa-pulse', '#60a5fa', true);

                try {
                    const html = await fetchHTML(url);
                    updateStatus('🧹 cleaning & formatting as article ...', 'fa-broom', '#c084fc', true);
                    
                    const cleanText = cleanHTML(html);
                    
                    // ----- FORMAT like a newspaper: convert plain text into structured HTML
                    const formattedHtml = formatTextAsArticle(cleanText);
                    
                    // Inject into output (as HTML)
                    $('#output').html(formattedHtml);
                    
                    updateStatus('✔️ article formatted', 'fa-circle-check', '#22c55e', false);
                    
                    if (!cleanText || cleanText.length < 20) {
                        $('#output').html('<p style="color:#f87171;">⚠️ Very little text extracted — page might be JavaScript heavy.</p>');
                    }
                } catch (error) {
                    $('#output').html(`<p style="color:#f87171;"><i class="fas fa-exclamation-triangle"></i> ${escapeHtml(error.message)}</p>`);
                    updateStatus('❌ failed', 'fa-circle-exclamation', '#f87171', false);
                }
            }

            // ----- event binding (jquery)
            $('#scrapeBtn').on('click', function(e) {
                e.preventDefault();
                performScrape();
            });

            $('#url').on('keypress', function(e) {
                if (e.which === 13) {
                    e.preventDefault();
                    performScrape();
                }
            });

            // copy button: copies the raw plain text (not HTML) to clipboard
            $('#copyBtn').on('click', function() {
                // we can extract plain text from output (so user gets clean text without <p> tags)
                const outputDiv = $('#output');
                // get plain text version (browser innerText simulates rendering)
                // we'll use a dummy element to extract innerText to preserve line breaks as they appear
                const tempDiv = $('<div>').html(outputDiv.html()); // clone html
                // but innerText works on actual DOM, so better:
                const plain = outputDiv[0].innerText || outputDiv.text();
                
                if (!plain || plain.includes('Result will appear') || plain.includes('fetching')) {
                    alert('nothing to copy yet');
                    return;
                }
                navigator.clipboard.writeText(plain).then(() => {
                    const originalHtml = $('#copyBtn').html();
                    $('#copyBtn').html('<i class="fas fa-check"></i> copied!');
                    setTimeout(() => {
                        $('#copyBtn').html(originalHtml);
                    }, 2000);
                }).catch(() => {
                    alert('copy failed, select manually');
                });
            });

            // hide spinner initially
            $('#loadingSpinner').hide();

        }); // end ready
    </script>
</body>
</html>
